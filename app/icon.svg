<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#111111"/>

  <!-- Shopping bag body -->
  <path
    d="M8.5 13.5 L9.5 25.5 L22.5 25.5 L23.5 13.5 Z"
    fill="white"
  />

  <!-- Bag handles -->
  <path
    d="M12 13.5 C12 13.5 12 8 16 8 C20 8 20 13.5 20 13.5"
